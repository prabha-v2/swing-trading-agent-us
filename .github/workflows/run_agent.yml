name: Swing Trading Agent

on:
  # -------------------------------------------------------
  # US Market hours schedule (all times in UTC)
  # Daylight Saving active (Mar–Nov):
  #   US market = 13:30–20:00 UTC = 7:00 PM–1:30 AM IST
  #   We start 1hr early at 12:30 UTC = 6:00 PM IST
  #   We stop at market close 20:00 UTC = 1:30 AM IST
  #
  # Every 30 mins from 12:30 UTC to 20:00 UTC, Mon–Fri
  # -------------------------------------------------------
  schedule:
    - cron: '30 12 * * 1-5'   # 6:00 PM IST — 1hr before US open
    - cron: '30 14 * * 1-5'   # 8:00 PM IST
    - cron: '30 16 * * 1-5'   # 10:00 PM IST
    - cron: '30 18 * * 1-5'   # 12:00 AM IST
    - cron: '00 21 * * 1-5'   # 2:30 AM IST — post-close EOD scan (most reliable)
  workflow_dispatch:   # keep manual trigger for testing

# Allow the workflow to push trade_log.csv back to the repo
permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 115

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Fetch full history so git push works cleanly
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading agent
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python swing_trading_agent_us.py

      # Commit trade_log.csv (and updated positions.csv if changed) back to repo
      - name: Commit trade log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trade_log.csv positions.csv 2>/dev/null || true
          git diff --staged --quiet || git commit -m "📊 Trade log $(date +'%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
